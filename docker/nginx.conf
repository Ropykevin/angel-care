# Copy to: /etc/nginx/sites-available/pediatric-clinic
# Then: sudo ln -s /etc/nginx/sites-available/pediatric-clinic /etc/nginx/sites-enabled/
# Replace YOUR_DOMAIN with your VPS domain or IP.

server {
    listen 80;
    server_name YOUR_DOMAIN;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:5052;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
