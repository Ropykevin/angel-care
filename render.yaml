services:
  - type: web
    name: pediatric-clinic
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pediatric-clinic-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0

databases:
  - name: pediatric-clinic-db
    plan: free
    databaseName: pediatric_clinic
    user: pediatric_clinic_user
