{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <!-- Back Button -->
    <a href="/" class="btn btn-outline-secondary mb-3">← Back to Home</a>

    <div class="card shadow-lg p-4">
        <h3 class="mb-4 text-center">Book an Appointment</h3>
        <p class="text-center text-muted">Fill in the details below and we will contact you.</p>

        <form method="POST">

            <!-- Child Name -->
            <div class="mb-3">
                <label class="form-label">Child Name</label>
                <input class="form-control" name="name" required>
            </div>

            <!-- Appointment Date -->
            <div class="mb-3">
                <label class="form-label">Appointment Date</label>
                <input class="form-control" type="datetime-local" name="date" required>
            </div>

            <!-- Reason -->
            <div class="mb-3">
                <label class="form-label">Reason</label>
                <textarea class="form-control" name="reason" rows="3"></textarea>
            </div>

            <!-- Submit -->
            <div class="text-end">
                <button class="btn btn-primary">Book Appointment</button>
            </div>

        </form>
    </div>

</div>

{% endblock %}
